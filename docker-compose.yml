services:
  # ---------------------------------------------------------------------------
  # Nginx — Reverse proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./apps/api:/var/www/api:ro
    depends_on:
      - api
      - web
    networks:
      - assinatura

  # ---------------------------------------------------------------------------
  # Laravel API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    volumes:
      - ./apps/api:/var/www/api
      - api_storage:/var/www/api/storage
    environment:
      APP_ENV: production
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: assinatura_db
      DB_USERNAME: assinatura
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - assinatura

  # ---------------------------------------------------------------------------
  # Queue Worker (assinaturas em segundo plano)
  # ---------------------------------------------------------------------------
  queue:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: ["php", "artisan", "queue:work", "--queue=signatures,default", "--tries=3", "--sleep=3"]
    volumes:
      - ./apps/api:/var/www/api
      - api_storage:/var/www/api/storage
    environment:
      APP_ENV: production
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    depends_on:
      - api
    networks:
      - assinatura
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # React Frontend (build estático servido pelo Nginx em produção)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    networks:
      - assinatura

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: assinatura_db
      POSTGRES_USER: assinatura
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assinatura -d assinatura_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - assinatura

  # ---------------------------------------------------------------------------
  # Redis 8
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - assinatura

networks:
  assinatura:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  api_storage:
